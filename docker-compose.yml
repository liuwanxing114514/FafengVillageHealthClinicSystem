services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: clinic-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-clinic}
      POSTGRES_USER: ${POSTGRES_USER:-clinic}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change_me}
    volumes:
      - ${CLINIC_DATA_DIR:-./clinic-data}/postgres:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-clinic} -d ${POSTGRES_DB:-clinic}"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: clinic-backend
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      CLINIC_DB_PASSWORD: ${POSTGRES_PASSWORD:-change_me}
      CLINIC_AI_ENABLED: ${CLINIC_AI_ENABLED:-false}
      CLINIC_AI_PROVIDER: ${CLINIC_AI_PROVIDER:-noop}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
      LOCAL_AI_BASE_URL: ${LOCAL_AI_BASE_URL:-http://localhost:11434}
    volumes:
      - ${CLINIC_DATA_DIR:-./clinic-data}/uploads:/app/uploads
    ports:
      - "${BACKEND_PORT:-8080}:8080"

  frontend:
    build: ./frontend
    container_name: clinic-frontend
    depends_on:
      - backend
    ports:
      - "${FRONTEND_PORT:-80}:80"
