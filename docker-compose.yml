# 发凤村卫生室 — Docker Compose
# 生产（群晖 DS920+）：默认仅 core 三服务
#   docker compose up -d --build
# 可选 OCR 入库：docker compose --profile ocr up -d --build
# Whisper 默认不部署（手机用输入法语音）；若需页面内录音：
#   docker compose --profile whisper up -d --build 且 CLINIC_WHISPER_URL=http://whisper-service:9000
# 详见 docs/共用/DEPLOYMENT.md

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: clinic-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-clinic}
      POSTGRES_USER: ${POSTGRES_USER:-clinic}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change_me}
    volumes:
      - ${CLINIC_DATA_DIR:-./clinic-data}/postgres:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-clinic} -d ${POSTGRES_DB:-clinic}"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: clinic-backend
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      CLINIC_DB_PASSWORD: ${POSTGRES_PASSWORD:-change_me}
      CLINIC_AI_ENABLED: ${CLINIC_AI_ENABLED:-false}
      CLINIC_AI_PROVIDER: ${CLINIC_AI_PROVIDER:-noop}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
      DEEPSEEK_BASE_URL: ${DEEPSEEK_BASE_URL:-https://api.deepseek.com}
      DEEPSEEK_MODEL: ${DEEPSEEK_MODEL:-deepseek-chat}
      DEEPSEEK_FALLBACK_API_KEY: ${DEEPSEEK_FALLBACK_API_KEY:-}
      DEEPSEEK_FALLBACK_BASE_URL: ${DEEPSEEK_FALLBACK_BASE_URL:-https://api.deepseek.com}
      DEEPSEEK_FALLBACK_MODEL: ${DEEPSEEK_FALLBACK_MODEL:-deepseek-chat}
      LOCAL_AI_BASE_URL: ${LOCAL_AI_BASE_URL:-http://localhost:11434}
      CLINIC_WHISPER_URL: ${CLINIC_WHISPER_URL:-}
      CLINIC_VOICE_UPLOAD_DIR: ${CLINIC_VOICE_UPLOAD_DIR:-uploads/audio}
      CLINIC_VOICE_SAVE_AUDIO: ${CLINIC_VOICE_SAVE_AUDIO:-true}
      CLINIC_OCR_URL: ${CLINIC_OCR_URL:-}
      CLINIC_OCR_UPLOAD_DIR: ${CLINIC_OCR_UPLOAD_DIR:-uploads/images}
      CLINIC_EMBEDDING_ENABLED: ${CLINIC_EMBEDDING_ENABLED:-false}
      CLINIC_EMBEDDING_PROVIDER: ${CLINIC_EMBEDDING_PROVIDER:-openai}
      CLINIC_EMBEDDING_API_KEY: ${CLINIC_EMBEDDING_API_KEY:-}
      CLINIC_EMBEDDING_BASE_URL: ${CLINIC_EMBEDDING_BASE_URL:-https://api.siliconflow.cn/v1}
      CLINIC_EMBEDDING_LOCAL_BASE_URL: ${CLINIC_EMBEDDING_LOCAL_BASE_URL:-http://localhost:1234/v1}
      CLINIC_EMBEDDING_MODEL: ${CLINIC_EMBEDDING_MODEL:-BAAI/bge-m3}
      CLINIC_EMBEDDING_DIMENSIONS: ${CLINIC_EMBEDDING_DIMENSIONS:-1024}
      CLINIC_EMBEDDING_SYNC_CRON: ${CLINIC_EMBEDDING_SYNC_CRON:-}
      CLINIC_EMBEDDING_BATCH_SIZE: ${CLINIC_EMBEDDING_BATCH_SIZE:-16}
      CLINIC_SETTINGS_ENCRYPTION_KEY: ${CLINIC_SETTINGS_ENCRYPTION_KEY:-}
    volumes:
      - ${CLINIC_DATA_DIR:-./clinic-data}/uploads:/app/uploads
    ports:
      - "${BACKEND_PORT:-8080}:8080"

  frontend:
    build: ./frontend
    container_name: clinic-frontend
    depends_on:
      - backend
    ports:
      - "${FRONTEND_PORT:-80}:80"

  # v1.1 可选（生产默认不启；手机请用输入法语音）：--profile whisper
  whisper-service:
    image: onerahmet/openai-whisper-asr-webservice:latest
    container_name: clinic-whisper
    profiles: ["whisper"]
    environment:
      ASR_MODEL: base
      ASR_ENGINE: faster_whisper
    ports:
      - "${WHISPER_PORT:-9000}:9000"

  # v1.4 可选：docker compose --profile ocr up -d
  ocr-service:
    build: ./ocr-service
    container_name: clinic-ocr
    profiles: ["ocr"]
    ports:
      - "${OCR_PORT:-8000}:8000"
