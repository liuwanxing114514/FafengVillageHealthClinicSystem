spring:
  application:
    name: clinic-backend
  profiles:
    active: @spring.profiles.active@
  autoconfigure:
    exclude:
      - org.springframework.ai.model.openai.autoconfigure.OpenAiChatAutoConfiguration
      - org.springframework.ai.model.openai.autoconfigure.OpenAiEmbeddingAutoConfiguration
      - org.springframework.ai.model.openai.autoconfigure.OpenAiImageAutoConfiguration
      - org.springframework.ai.model.openai.autoconfigure.OpenAiAudioSpeechAutoConfiguration
      - org.springframework.ai.model.openai.autoconfigure.OpenAiAudioTranscriptionAutoConfiguration
      - org.springframework.ai.model.openai.autoconfigure.OpenAiModerationAutoConfiguration
      - org.springframework.ai.autoconfigure.chat.client.ChatClientAutoConfiguration
  ai:
    openai:
      api-key: ${DEEPSEEK_API_KEY:}
      base-url: ${DEEPSEEK_BASE_URL:https://api.deepseek.com}
      chat:
        options:
          model: ${DEEPSEEK_MODEL:deepseek-chat}
          temperature: 0.2
  threads:
    virtual:
      enabled: true
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health,info

clinic:
  ai:
    enabled: ${CLINIC_AI_ENABLED:false}
    provider: ${CLINIC_AI_PROVIDER:noop}
    deepseek-api-key: ${DEEPSEEK_API_KEY:}
    deepseek-base-url: ${DEEPSEEK_BASE_URL:https://api.deepseek.com}
    deepseek-model: ${DEEPSEEK_MODEL:deepseek-chat}
    local-base-url: ${LOCAL_AI_BASE_URL:http://localhost:11434}
  voice:
    whisper-url: ${CLINIC_WHISPER_URL:}
    upload-dir: ${CLINIC_VOICE_UPLOAD_DIR:uploads/audio}
    save-audio: ${CLINIC_VOICE_SAVE_AUDIO:true}
  ocr:
    ocr-url: ${CLINIC_OCR_URL:}
    upload-dir: ${CLINIC_OCR_UPLOAD_DIR:uploads/images}

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      logic-delete-field: deletedAt
