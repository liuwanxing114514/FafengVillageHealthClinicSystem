spring:
  application:
    name: clinic-backend
  profiles:
    active: @spring.profiles.active@
  autoconfigure:
    exclude:
      - org.springframework.ai.model.openai.autoconfigure.OpenAiChatAutoConfiguration
      - org.springframework.ai.model.openai.autoconfigure.OpenAiEmbeddingAutoConfiguration
      - org.springframework.ai.model.openai.autoconfigure.OpenAiImageAutoConfiguration
      - org.springframework.ai.model.openai.autoconfigure.OpenAiAudioSpeechAutoConfiguration
      - org.springframework.ai.model.openai.autoconfigure.OpenAiAudioTranscriptionAutoConfiguration
      - org.springframework.ai.model.openai.autoconfigure.OpenAiModerationAutoConfiguration
      - org.springframework.ai.autoconfigure.chat.client.ChatClientAutoConfiguration
  ai:
    openai:
      api-key: ${DEEPSEEK_API_KEY:}
      base-url: ${DEEPSEEK_BASE_URL:https://api.deepseek.com}
      chat:
        options:
          model: ${DEEPSEEK_MODEL:deepseek-chat}
          temperature: 0.2
    retry:
      max-attempts: 1
      exclude-on-http-codes: 429,502,503,504
  threads:
    virtual:
      enabled: true
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health,info

clinic:
  ai:
    enabled: ${CLINIC_AI_ENABLED:false}
    provider: ${CLINIC_AI_PROVIDER:noop}
    deepseek-api-key: ${DEEPSEEK_API_KEY:}
    deepseek-base-url: ${DEEPSEEK_BASE_URL:https://api.deepseek.com}
    deepseek-model: ${DEEPSEEK_MODEL:deepseek-chat}
    deepseek-fallback-api-key: ${DEEPSEEK_FALLBACK_API_KEY:}
    deepseek-fallback-base-url: ${DEEPSEEK_FALLBACK_BASE_URL:https://api.deepseek.com}
    deepseek-fallback-model: ${DEEPSEEK_FALLBACK_MODEL:deepseek-chat}
    local-base-url: ${LOCAL_AI_BASE_URL:http://localhost:11434}
    embedding:
      enabled: ${CLINIC_EMBEDDING_ENABLED:false}
      provider: ${CLINIC_EMBEDDING_PROVIDER:openai}
      api-key: ${CLINIC_EMBEDDING_API_KEY:}
      base-url: ${CLINIC_EMBEDDING_BASE_URL:https://api.siliconflow.cn/v1}
      local-base-url: ${CLINIC_EMBEDDING_LOCAL_BASE_URL:http://localhost:1234/v1}
      model: ${CLINIC_EMBEDDING_MODEL:BAAI/bge-m3}
      dimensions: ${CLINIC_EMBEDDING_DIMENSIONS:1024}
      sync-cron: ${CLINIC_EMBEDDING_SYNC_CRON:}
      batch-size: ${CLINIC_EMBEDDING_BATCH_SIZE:16}
  voice:
    whisper-url: ${CLINIC_WHISPER_URL:}
    upload-dir: ${CLINIC_VOICE_UPLOAD_DIR:uploads/audio}
    save-audio: ${CLINIC_VOICE_SAVE_AUDIO:true}
  ocr:
    ocr-url: ${CLINIC_OCR_URL:}
    upload-dir: ${CLINIC_OCR_UPLOAD_DIR:uploads/images}
  settings:
    encryption-key: ${CLINIC_SETTINGS_ENCRYPTION_KEY:}

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      logic-delete-field: deletedAt
