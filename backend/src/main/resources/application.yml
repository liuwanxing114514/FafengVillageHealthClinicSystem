spring:
  application:
    name: clinic-backend
  profiles:
    active: @spring.profiles.active@
  threads:
    virtual:
      enabled: true
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health,info

clinic:
  ai:
    enabled: ${CLINIC_AI_ENABLED:false}
    provider: ${CLINIC_AI_PROVIDER:noop}
    deepseek-api-key: ${DEEPSEEK_API_KEY:}
    local-base-url: ${LOCAL_AI_BASE_URL:http://localhost:11434}

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      logic-delete-field: deletedAt
