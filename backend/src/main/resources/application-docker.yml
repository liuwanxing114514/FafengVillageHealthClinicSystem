# Docker Compose 内网（打包：mvn -Pdocker package）
spring:
  config:
    activate:
      on-profile: docker
  datasource:
    url: jdbc:postgresql://postgres:5432/clinic
    username: clinic
    password: ${CLINIC_DB_PASSWORD:change_me}

springdoc:
  api-docs:
    enabled: false
  swagger-ui:
    enabled: false
